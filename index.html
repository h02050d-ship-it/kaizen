<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#059669">
<title>モルダー修正ボード｜林材木店</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23059669'/><text x='51' y='46.5' font-size='60' text-anchor='middle' dominant-baseline='central' fill='%23ffffff' font-family='sans-serif' font-weight='bold'>修</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23059669'/><text x='51' y='46.5' font-size='60' text-anchor='middle' dominant-baseline='central' fill='%23ffffff' font-family='sans-serif' font-weight='bold'>修</text></svg>">
<meta name="apple-mobile-web-app-title" content="修正ボード">
<style>
:root{
  --bg:#eef5f1; --card:#ffffff; --ink:#1f2e28; --sub:#78897f; --line:#dce8e2;
  --accent:#059669; --accent2:#047857; --danger:#d15a3c; --ok:#3d8a4f; --warn:#e08a1e; --info:#2f74c0;
  --chip:#e3efe9; --hl:#f0f7f3;
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic UI","Meiryo",sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;padding-bottom:96px}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:16px}

/* ===== ヘッダー ===== */
header{position:sticky;top:0;z-index:30;background:var(--accent);color:#fff;padding:calc(env(safe-area-inset-top) + 10px) 14px 10px;display:flex;align-items:center;gap:8px;box-shadow:0 2px 10px rgba(31,46,40,.18)}
header .ttl{font-size:16px;font-weight:800;letter-spacing:.04em;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
header .ttl small{display:block;font-size:10px;font-weight:600;opacity:.78;letter-spacing:.1em}
.hbtn{border:0;background:rgba(255,255,255,.14);color:#fff;border-radius:9px;padding:7px 10px;font-size:12px;font-weight:700;white-space:nowrap;text-decoration:none;display:inline-flex;align-items:center;gap:4px}
.hbtn:active{background:rgba(255,255,255,.28)}
#srcBadge{border:0;background:rgba(0,0,0,.16);color:#d6f0e4;border-radius:99px;padding:5px 10px;font-size:10.5px;font-weight:700}
#srcBadge.err{color:#ffd9c9}

/* ===== タブ ===== */
.tabs{position:sticky;top:calc(env(safe-area-inset-top) + 54px);z-index:25;display:flex;gap:6px;padding:10px 14px 8px;background:linear-gradient(var(--bg) 82%,rgba(238,245,241,0));max-width:760px;margin:0 auto}
.tab{flex:1;border:1.5px solid var(--line);background:var(--card);color:var(--sub);border-radius:12px;padding:9px 0;font-size:13px;font-weight:800}
.tab.on{background:var(--accent);border-color:var(--accent);color:#fff}
.tab .n{font-size:10.5px;margin-left:3px;opacity:.75}

/* ===== 本文 ===== */
main{padding:4px 14px 0;max-width:760px;margin:0 auto}
/* PC: 記録欄と集計欄を横並び（スマホは縦積み） */
.cols{display:block}
@media(min-width:1000px){
  main{max-width:1300px}
  .tabs{max-width:1300px}
  .cols{display:grid;grid-template-columns:1fr 1fr;gap:0 26px;align-items:start}
}
.sechead{font-size:12px;font-weight:800;color:var(--sub);letter-spacing:.06em;margin:16px 2px 8px;display:flex;align-items:center;gap:6px}
.sechead::after{content:"";flex:1;height:1px;background:var(--line)}

/* ===== 期間チップ ===== */
.pchips{display:flex;gap:6px;flex-wrap:wrap;margin:6px 2px 2px}
.pchip{border:1.5px solid var(--line);background:var(--card);color:var(--sub);border-radius:99px;padding:7px 14px;font-size:12.5px;font-weight:800}
.pchip.on{background:var(--accent);border-color:var(--accent);color:#fff}

/* ===== 集計カード ===== */
.sumgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-top:4px}
.sumcard{background:var(--card);border:1px solid var(--line);border-left:5px solid var(--cc,var(--accent));border-radius:14px;padding:12px 14px;box-shadow:0 1px 5px rgba(31,46,40,.06)}
.sumcard .th{font-size:13px;font-weight:800;color:var(--ink)}
.sumcard .th .sub{font-size:10.5px;font-weight:700;color:var(--sub);margin-left:4px}
.sumcard .rate{font-size:32px;font-weight:900;line-height:1.1;margin:4px 0 2px;color:var(--cc,var(--accent))}
.sumcard .rate small{font-size:14px;font-weight:800}
.sumcard .cnt{font-size:11.5px;color:var(--sub);font-weight:700}
.sumcard .bd{font-size:10.5px;color:var(--sub);margin-top:6px;display:flex;gap:8px;flex-wrap:wrap}
.sumcard .bd b{color:var(--ink)}

/* ===== 仕分け比較 ===== */
.cmpwrap{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;box-shadow:0 1px 5px rgba(31,46,40,.06)}
.cmprow{padding:9px 0;border-bottom:1px dashed var(--line)}
.cmprow:last-child{border-bottom:0}
.cmprow .cth{font-size:12.5px;font-weight:800;margin-bottom:7px}
.cmpcols{display:flex;gap:10px}
.cmpcol{flex:1;background:var(--hl);border-radius:10px;padding:8px 10px;text-align:center}
.cmpcol .lb{font-size:10.5px;font-weight:800;color:var(--sub)}
.cmpcol .v{font-size:22px;font-weight:900;line-height:1.2;margin-top:2px}
.cmpcol .c2{font-size:10px;color:var(--sub);font-weight:700}
.cmpcol.nd .v{color:var(--sub);font-size:13px;font-weight:800;padding:5px 0}
.cmpcol.win{background:#e7f4ec}
.cmpcol.win .v{color:var(--ok)}

/* ===== 月別ミニ棒グラフ ===== */
.trend{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 14px 8px;box-shadow:0 1px 5px rgba(31,46,40,.06)}
.bars{display:flex;align-items:flex-end;gap:8px;height:130px}
.barcol{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;min-width:0}
.barcol .pct{font-size:10.5px;font-weight:800;color:var(--ink);margin-bottom:3px;white-space:nowrap}
.barcol .bar{width:70%;max-width:34px;background:linear-gradient(var(--accent),var(--accent2));border-radius:6px 6px 0 0;min-height:3px;transition:height .3s}
.barcol.empty .bar{background:var(--line)}
.barcol .mo{font-size:10px;font-weight:700;color:var(--sub);margin-top:6px;white-space:nowrap}
.barcol .cn{font-size:9px;color:var(--sub)}

/* ===== 履歴リスト ===== */
.rec{background:var(--card);border:1px solid var(--line);border-left:5px solid var(--cc,var(--accent));border-radius:13px;padding:11px 13px;margin-bottom:9px;box-shadow:0 1px 5px rgba(31,46,40,.06);display:flex;align-items:center;gap:11px}
.rec .info{flex:1;min-width:0}
.rec .l1{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.rec .date{font-size:13px;font-weight:800}
.rec .l2{font-size:14px;font-weight:800;margin-top:4px}
.rec .l2 .rt{color:var(--cc,var(--accent))}
.rec .l3{font-size:10.5px;color:var(--sub);margin-top:4px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.rec .l3 b{color:var(--ink)}
.rec .chev{flex:0 0 auto;color:var(--sub);font-size:18px}
.badge{font-size:10px;font-weight:800;padding:2px 8px;border-radius:99px;background:var(--chip);color:var(--accent2)}
.badge.sort{background:#e6eef8;color:var(--info)}
.badge.sort.on{background:#e7f4ec;color:var(--ok)}
.byb{font-size:10px;font-weight:800;color:#fff;background:var(--accent);border-radius:99px;padding:2px 9px}

/* ===== 改善カード ===== */
.tcard{background:var(--card);border:1px solid var(--line);border-left:5px solid var(--cc,#9ab);border-radius:14px;padding:12px 14px;margin-bottom:10px;box-shadow:0 1px 5px rgba(31,46,40,.06)}
.tcard .th{display:flex;align-items:center;gap:7px}
.tcard .th .t{font-size:15px;font-weight:800;flex:1;min-width:0}
.tcard .body{font-size:12.5px;color:var(--ink);opacity:.9;line-height:1.5;margin-top:6px}
.tcard .body .lbl{font-size:10px;font-weight:800;color:var(--sub);display:block}
.tcard .meta{font-size:10.5px;color:var(--sub);margin-top:8px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.sbadge{font-size:10px;font-weight:800;padding:3px 10px;border-radius:99px}
.sb-out{background:#e9edeb;color:#5f6f67}
.sb-do{background:#e6eef8;color:var(--info)}
.sb-chk{background:#fbeed6;color:var(--warn)}
.sb-fin{background:#e7f4ec;color:var(--ok)}
.catb{font-size:10px;font-weight:800;padding:2px 8px;border-radius:99px;background:var(--chip);color:var(--accent2)}

.empty{text-align:center;color:var(--sub);padding:52px 0;font-size:13px;line-height:2}
.empty .big{font-size:34px}

/* ===== 刃物管理 加工実績リスト ===== */
.hamowrap{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:4px 13px;box-shadow:0 1px 5px rgba(31,46,40,.06)}
.hamoempty{text-align:center;color:var(--sub);font-size:12px;padding:16px 0;line-height:1.8}
.hamorow{display:flex;align-items:center;gap:10px;padding:10px 1px;border-bottom:1px dashed var(--line);cursor:pointer}
.hamorow:last-child{border-bottom:0}
.hamorow .hi{flex:1;min-width:0}
.hamorow .hl1{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.hamorow .hw{font-size:11px;font-weight:800;color:var(--sub)}
.hamorow .hn{font-size:13.5px;font-weight:800}
.hamorow .hl2{font-size:12px;color:var(--sub);font-weight:700;margin-top:3px}
.hamorow .hl2 b{color:var(--ink);font-size:13px}
.hamorow .hdone{color:var(--ok);font-weight:800}
.hbtn2{flex:0 0 auto;border:1.5px solid var(--accent);color:var(--accent2);background:#fff;border-radius:10px;padding:8px 12px;font-size:12px;font-weight:800}
.hamomerge{padding:2px 0 10px;border-bottom:1px dashed var(--line)}
.hamomerge:last-child{border-bottom:0}
.hamomerge button{width:100%;border:1.5px dashed var(--accent);background:var(--hl);color:var(--accent2);border-radius:10px;padding:9px 10px;font-size:12px;font-weight:800;text-align:center;line-height:1.5}
.hamomerge button:active{background:#dff0e8}

/* ===== FAB ===== */
#fab{position:fixed;right:18px;bottom:calc(env(safe-area-inset-bottom) + 18px);z-index:40;border:0;border-radius:99px;background:var(--accent);color:#fff;font-size:15px;font-weight:800;padding:15px 22px;box-shadow:0 6px 18px rgba(4,120,87,.4);display:none;align-items:center;gap:7px}
#fab:active{transform:scale(.96)}

/* ===== モーダル共通 ===== */
.mwrap{position:fixed;inset:0;z-index:50;display:none;align-items:flex-end;justify-content:center;background:rgba(31,46,40,.45)}
.mwrap.show{display:flex}
.modal{background:var(--card);width:100%;max-width:640px;max-height:90vh;border-radius:20px 20px 0 0;display:flex;flex-direction:column;animation:up .18s ease}
@media(min-width:700px){.mwrap{align-items:center}.modal{border-radius:20px}}
@keyframes up{from{transform:translateY(40px);opacity:.6}to{transform:none;opacity:1}}
.mhead{display:flex;align-items:center;padding:16px 18px 10px}
.mhead h2{font-size:16px;font-weight:800;flex:1}
.mx{border:0;background:var(--chip);border-radius:99px;width:32px;height:32px;font-size:14px;color:var(--sub)}
.mbody{overflow-y:auto;padding:2px 18px 18px;-webkit-overflow-scrolling:touch}
.fld{margin-bottom:13px}
.fld label{display:block;font-size:12px;font-weight:800;color:var(--sub);margin-bottom:5px}
.fld label em{color:var(--danger);font-style:normal;margin-left:2px}
.fld input[type=text],.fld input[type=number],.fld input[type=date],.fld select,.fld textarea{width:100%;padding:11px 12px;border:1.5px solid var(--line);border-radius:11px;background:#fff;outline:none}
.fld textarea{min-height:52px;resize:vertical;line-height:1.5}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--accent)}
.row2{display:flex;gap:10px}
.row2>.fld{flex:1}
.row3{display:flex;gap:8px}
.row3>.fld{flex:1}
.segrow{display:flex;gap:6px;flex-wrap:wrap}
.seg{border:1.5px solid var(--line);background:#fff;border-radius:11px;padding:11px 18px;font-size:14px;font-weight:800;color:var(--sub)}
.seg.on{background:var(--accent);border-color:var(--accent);color:#fff}
.livebox{background:var(--hl);border-radius:11px;padding:11px 13px;font-size:13px;font-weight:800;text-align:center;margin-bottom:13px;color:var(--ink)}
.livebox .rr{color:var(--accent);font-size:18px}
.whochips{display:flex;flex-wrap:wrap;gap:8px}
.who{border:1.5px solid var(--line);background:#fff;border-radius:12px;padding:11px 18px;font-size:14px;font-weight:800;color:var(--ink)}
.who.on{background:var(--accent);border-color:var(--accent);color:#fff}
.whoedit{border:0;background:none;font-size:11.5px;color:var(--sub);text-decoration:underline;padding:4px}
.merr{color:var(--danger);font-size:12px;font-weight:700;text-align:center;min-height:18px;padding-top:6px}
.msave{width:100%;border:0;border-radius:13px;background:var(--accent);color:#fff;font-size:15px;font-weight:800;padding:14px 0;margin-top:4px}
.msave:disabled{opacity:.5}
.mdel{width:100%;border:1.5px solid #e8cfc3;background:#fff;border-radius:13px;color:var(--danger);font-size:13px;font-weight:800;padding:12px 0;margin-top:10px}

/* ===== ログインゲート ===== */
#gate{position:fixed;inset:0;z-index:100;background:var(--bg);display:none;align-items:center;justify-content:center;padding:22px}
.gcard{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:30px 24px;width:100%;max-width:360px;box-shadow:0 10px 40px rgba(31,46,40,.12);text-align:center}
.gcard .logo{font-size:40px}
.gcard h1{font-size:17px;font-weight:800;margin:8px 0 2px}
.gcard p{font-size:11.5px;color:var(--sub);margin-bottom:18px}
.gcard input{width:100%;padding:12px 13px;border:1.5px solid var(--line);border-radius:11px;margin-bottom:10px;outline:none;background:#fff}
.gcard input:focus{border-color:var(--accent)}
.pwrow{position:relative}
.pwrow button{position:absolute;right:4px;top:4px;border:0;background:none;font-size:15px;padding:8px}
.gkeep{display:flex;align-items:center;justify-content:center;gap:6px;font-size:12px;color:var(--sub);margin:4px 0 14px}
.gkeep input{width:16px;height:16px;accent-color:var(--accent)}
#gateBtn{width:100%;border:0;border-radius:12px;background:var(--accent);color:#fff;font-size:15px;font-weight:800;padding:13px 0}
#gateErr{color:var(--danger);font-size:12px;font-weight:700;min-height:18px;margin-top:10px}

/* ===== トースト ===== */
#toast{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 86px);transform:translateX(-50%) translateY(20px);z-index:80;background:var(--ink);color:#fff;font-size:13px;font-weight:700;padding:11px 20px;border-radius:99px;opacity:0;pointer-events:none;transition:.25s;max-width:90vw;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%)}
.spin{display:inline-block;width:26px;height:26px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:sp 1s linear infinite;margin-bottom:12px}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<header>
  <div class="ttl">🪚 モルダー修正ボード<small>HAYASHI LUMBER — 加工修正率の管理</small></div>
  <button id="srcBadge">…</button>
  <a class="hbtn" id="sheetBtn" target="_blank" style="display:none">📊</a>
</header>

<main id="list"></main>

<button id="fab">＋ 記録</button>

<!-- 不良記録 追加・編集 -->
<div class="mwrap" id="recWrap">
  <div class="modal">
    <div class="mhead"><h2 id="recTitle">不良を記録</h2><button class="mx" data-close="recWrap">✕</button></div>
    <div class="mbody">
      <div class="fld"><label>日付<em>*</em></label><input type="date" id="fDate"></div>
      <div class="fld"><label>厚み<em>*</em></label>
        <div class="segrow" id="thickSeg">
          <button type="button" class="seg" data-th="12">12mm</button>
          <button type="button" class="seg" data-th="15">15mm</button>
          <button type="button" class="seg" data-th="other">その他</button>
        </div>
        <input type="text" id="fThickOther" placeholder="厚みを入力（例：18mm）" style="display:none;margin-top:8px">
      </div>
      <div class="fld"><label>長さ</label>
        <div class="segrow" id="lenSeg">
          <button type="button" class="seg" data-len="1m">1m</button>
          <button type="button" class="seg" data-len="2m">2m</button>
          <button type="button" class="seg" data-len="3m">3m</button>
          <button type="button" class="seg" data-len="4m">4m</button>
        </div>
      </div>
      <div class="fld"><label>等級</label>
        <div class="segrow" id="gradeSeg"></div>
      </div>
      <div class="fld"><label>商品メモ</label><input type="text" id="fProduct" placeholder="例：桧羽目板（任意）"></div>
      <div class="fld"><label>原板の仕分け<em>*</em></label>
        <div class="segrow" id="sortSeg">
          <button type="button" class="seg" data-sort="なし">仕分けなし</button>
          <button type="button" class="seg" data-sort="あり">仕分けあり</button>
        </div>
        <input type="text" id="fSortCond" placeholder="仕分け条件（例：生き節が端に少ない板を選別）" style="display:none;margin-top:8px">
      </div>
      <div class="fld"><label>加工枚数<em>*</em></label><input type="number" id="fTotal" min="1" inputmode="numeric" placeholder="例：60"></div>
      <div class="fld"><label>修正行き枚数（割れ・埋木飛びなど全部まとめて）<em>*</em></label><input type="number" id="fFix" min="0" value="0" inputmode="numeric"></div>
      <div class="livebox" id="liveBox">加工枚数を入力してください</div>
      <div class="fld"><label>メモ</label><textarea id="fMemo" placeholder="気づいたこと・原因の推測など（任意）"></textarea></div>
      <div class="fld"><label>記録者</label>
        <div class="whochips" id="recWhoChips"></div>
        <div style="text-align:right;margin-top:6px"><button class="whoedit" id="memberEditBtn">メンバーを編集</button></div>
      </div>
      <div class="merr" id="recErr"></div>
      <button class="msave" id="recSave">保存する</button>
      <button class="mdel" id="recDel" style="display:none">🗑 この記録を削除</button>
    </div>
  </div>
</div>

<!-- メンバー編集 -->
<div class="mwrap" id="memberWrap">
  <div class="modal">
    <div class="mhead"><h2>👷 メンバー編集</h2><button class="mx" data-close="memberWrap">✕</button></div>
    <div class="mbody">
      <div class="fld"><label>メンバー（1行に1人）</label><textarea id="memberText" style="min-height:120px"></textarea></div>
      <div class="merr" id="memberErr"></div>
      <button class="msave" id="memberSave">保存する</button>
    </div>
  </div>
</div>

<!-- ログインゲート -->
<div id="gate">
  <div class="gcard">
    <div class="logo">🪚</div>
    <h1>モルダー修正ボード</h1>
    <p>加工したうち何枚が修正行きか記録して改善に役立てる</p>
    <input id="gateMail" type="email" placeholder="メールアドレス" autocomplete="username">
    <div class="pwrow">
      <input id="gatePass" type="password" placeholder="パスワード" autocomplete="current-password">
      <button id="pwEye" type="button">👁</button>
    </div>
    <label class="gkeep"><input type="checkbox" id="gateKeep" checked>この端末でログインを保持する</label>
    <button id="gateBtn">ログイン</button>
    <div id="gateErr"></div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ===== 接続設定 ===== */
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyCuoNKlyC3x9AN1XA3eNe1RXOld21X5ubvLobrqvB3NvArugqcPsdmP-VgzBbw2-X3/exec';
const CRED_KEY="hayazai_kaizen_cred";
const CACHE_KEY="hayazai_kaizen_cache";
const WHO_KEY="hayazai_kaizen_who";

/* ===== 状態 ===== */
let RECORDS=[], THEMES=[], MEMBERS=[], SHEET_URL="", TODAY="";
let PERIOD="30d";        // 30d | thism | lastm | all
let editRecId=null;

/* ===== 刃物管理ツール連携（モルダー加工実績） ===== */
const HAMONO_API="https://script.google.com/macros/s/AKfycbwmcImkSxLl63lzlWAbRcUgfIG9dajZHOoFBtqQn_0z5v3Lg_ydXSOauHHCMeCu3Qfxww/exec";
const HAMONO_MAP={"15mmフローリング":{th:"15",prod:"フローリング"},"12mmフローリング":{th:"12",prod:"フローリング"},"羽目板":{th:"12",prod:"羽目板"},"スノコ":{th:"",prod:"スノコ"},"ナイス新刃":{th:"",prod:"ナイスオリジナル"}};
let HAMONO={state:"loading",hist:[]};
function hamonoDisp(n){ return n==="ナイス新刃"?"ナイスオリジナル":String(n||""); }
function fetchHamono(){
  const cb="__hamonoCb"+Math.floor(Math.random()*1e9);
  const s=document.createElement("script");
  let finished=false;
  const done=(ok,j)=>{
    if(finished) return; finished=true;
    try{ delete window[cb]; }catch(e){ window[cb]=undefined; }
    if(s.parentNode) s.parentNode.removeChild(s);
    HAMONO.state=ok?"ok":"err";
    if(ok) HAMONO.hist=(j&&j.history)||[];
    if($("gate").style.display!=="flex") render();
  };
  window[cb]=j=>done(true,j);
  s.onerror=()=>done(false);
  s.src=HAMONO_API+"?action=get&callback="+cb;
  document.body.appendChild(s);
  setTimeout(()=>done(false),15000);
}

/* ===== 資格情報（共通SSO: h02050d-ship-it.github.io の他ツールのログインを引き継ぐ）===== */
const SSO_KEY="hayazai_sso_cred";
const SSO_PEERS=["hayazai_board_cred","hayazai_seiso_cred","hayazai_rulebook_cred","hayazai_kaizen_cred","notify_creds_v1","seinodesk_cred","faxdesk_cred","orderdesk_cred","nippou_cred"];
function ssoFind_(){
  const keys=[SSO_KEY].concat(SSO_PEERS);
  for(const k of keys){
    try{ const v=JSON.parse(localStorage.getItem(k)||"null");
      if(v){ const email=v.email||v.e, pass=v.pass||v.p; if(email&&pass) return {email:String(email),pass:String(pass)}; }
    }catch(e){}
  }
  return null;
}
function ssoWrite(email,pass){ try{ localStorage.setItem(SSO_KEY,JSON.stringify({email:email,pass:pass})); }catch(e){} }
function ssoClear(){ try{ localStorage.removeItem(SSO_KEY); }catch(e){} }
function creds(){
  try{ const v=JSON.parse(localStorage.getItem(CRED_KEY)||sessionStorage.getItem(CRED_KEY)||"null"); if(v&&v.email&&v.pass) return v; }catch(e){}
  const s=ssoFind_(); if(s){ try{ localStorage.setItem(CRED_KEY,JSON.stringify(s)); }catch(e){} return s; }
  return {};
}
function saveCreds(email,pass,keep){ const v=JSON.stringify({email,pass}); if(keep){ localStorage.setItem(CRED_KEY,v); sessionStorage.removeItem(CRED_KEY); } else { sessionStorage.setItem(CRED_KEY,v); localStorage.removeItem(CRED_KEY); } ssoWrite(email,pass); }
function clearCreds(){ localStorage.removeItem(CRED_KEY); sessionStorage.removeItem(CRED_KEY); localStorage.removeItem(CACHE_KEY); ssoClear(); }
function authQS(){ const c=creds(); return "email="+encodeURIComponent(c.email||"")+"&pass="+encodeURIComponent(c.pass||""); }

/* ===== ユーティリティ ===== */
const $=id=>document.getElementById(id);
function esc(s){ return String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])); }
function b64utf8(s){ const b=new TextEncoder().encode(s); let x=""; for(let i=0;i<b.length;i+=0x8000){ x+=String.fromCharCode.apply(null,b.subarray(i,i+0x8000)); } return btoa(x); }
let toastTimer=null;
function toast(msg){ const t=$("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),2400); }

/* ===== 日付 ===== */
function todayStr(){ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function fmtMD(s){ if(!s) return ""; const p=s.split("-"); return (+p[1])+"/"+(+p[2]); }
function ym(s){ return s?s.slice(0,7):""; }
function pct(r){ return (Math.round(r*1000)/10).toFixed(1); }

/* 厚み正規化＆ラベル */
function normThick(t){ t=String(t||"").trim(); if(t==="12"||t==="12mm") return "12"; if(t==="15"||t==="15mm") return "15"; return t||"その他"; }
function thickLabel(k){ if(k==="12") return "12mm厚"; if(k==="15") return "15mm厚"; return (k==="その他"||!k)?"その他":k; }
function thickBadge(t){ const k=normThick(t); if(k==="12")return "12mm"; if(k==="15")return "15mm"; return k; }
function thickColor(k){ if(k==="12") return "var(--danger)"; if(k==="15") return "var(--info)"; return "var(--sub)"; }

/* ===== データ取得 ===== */
async function fetchOnce(url,ms){
  const ctrl=new AbortController(); const to=setTimeout(()=>ctrl.abort(),ms);
  try{ const r=await fetch(url,{signal:ctrl.signal}); const t=await r.text(); if(!t||t.trim()[0]!=="{") throw new Error("bad response"); return JSON.parse(t); }
  finally{ clearTimeout(to); }
}
async function fetchAll(){
  setBadge("load");
  fetchHamono();
  let j=null;
  for(let i=0;i<3&&!j;i++){ try{ j=await fetchOnce(GAS_URL+"?api=all&"+authQS(), i===0?25000:12000); }catch(e){ j=null; } }
  if(!j){ setBadge("err"); if(!RECORDS.length&&!THEMES.length) $("list").innerHTML='<div class="empty"><div class="big">📡</div>読み込みに失敗しました<br><button class="whoedit" style="margin-top:14px;font-size:13px" onclick="fetchAll()">再読み込み</button></div>'; return; }
  if(!j.ok){ if(j.error==="unauthorized"){ clearCreds(); showGate("メールまたはパスワードが違います"); } else { setBadge("err"); toast("エラー: "+(j.error||"不明")); } return; }
  RECORDS=j.records||[]; THEMES=j.themes||[]; MEMBERS=j.members||[]; SHEET_URL=j.sheetUrl||""; TODAY=j.today||todayStr();
  try{ localStorage.setItem(CACHE_KEY,JSON.stringify({records:RECORDS,themes:THEMES,members:MEMBERS,sheetUrl:SHEET_URL})); }catch(e){}
  const sb=$("sheetBtn"); if(SHEET_URL){ sb.href=SHEET_URL; sb.style.display=""; }
  setBadge("live"); render();
}
function loadCache(){ try{ const s=localStorage.getItem(CACHE_KEY); return s?JSON.parse(s):null; }catch(e){ return null; } }

async function postAction(payload){
  const c=creds();
  const body=b64utf8(JSON.stringify({...payload,email:c.email,pass:c.pass}));
  const r=await fetch(GAS_URL,{method:"POST",body:body});
  const t=await r.text();
  if(!t||t.trim()[0]!=="{") throw new Error("bad response");
  return JSON.parse(t);
}

/* ===== 期間フィルタ ===== */
function periodStart(){
  const t=TODAY||todayStr();
  if(PERIOD==="all") return "0000-00-00";
  if(PERIOD==="thism") return t.slice(0,7)+"-01";
  if(PERIOD==="lastm"){ const [y,m]=t.split("-").map(Number); const py=m===1?y-1:y, pm=m===1?12:m-1; return py+"-"+String(pm).padStart(2,"0")+"-01"; }
  // 30d
  const dd=new Date(t); dd.setDate(dd.getDate()-29);
  return dd.getFullYear()+"-"+String(dd.getMonth()+1).padStart(2,"0")+"-"+String(dd.getDate()).padStart(2,"0");
}
function periodEnd(){
  const t=TODAY||todayStr();
  if(PERIOD==="lastm"){ return t.slice(0,7)+"-01"; } // 先月末日まで＝今月1日未満
  return "9999-99-99";
}
function inPeriod(dateStr){
  if(PERIOD==="all") return true;
  if(PERIOD==="lastm"){ const s=periodStart(); return dateStr>=s && dateStr<periodEnd(); }
  return dateStr>=periodStart();
}
function periodRecords(){ return RECORDS.filter(r=>r.date&&inPeriod(r.date)); }

/* ===== 集計 ===== */
function agg(list){
  let total=0,fix=0;
  list.forEach(r=>{ total+=r.total; fix+=r.fix; });
  return {total,fix,rate:total>0?fix/total:0,n:list.length};
}

/* ===== 描画 ===== */
function render(){
  $("fab").style.display="flex";
  $("fab").innerHTML="＋ 記録";
  renderRec();
}

function renderRec(){
  const list=periodRecords();
  let html="";

  // 期間チップ
  html+='<div class="pchips">'
    +pchip("30d","直近30日")+pchip("thism","今月")+pchip("lastm","先月")+pchip("all","全期間")
    +'</div>';

  // ── 記録欄（左カラム）──
  let rec="";
  rec+='<div class="sechead">🔪 最近のモルダー加工（刃物管理と連動）</div>';
  rec+=hamonoHtml();
  rec+='<div class="sechead">🕐 記録一覧（新しい順）</div>';
  if(!RECORDS.length){
    rec+='<div class="empty" style="padding:30px 0"><div class="big">📉</div>まだ記録がありません<br>上の加工実績をタップするか、右下の「＋ 記録」から<br>「何枚中何枚 修正行きか」を記録できます</div>';
  } else if(!list.length){
    rec+='<div class="empty" style="padding:26px 0">この期間の記録はありません<br><span style="font-size:11px">上の期間を変えてみてください</span></div>';
  } else {
    list.forEach(r=>rec+=recRow(r));
  }

  // ── 集計欄（右カラム）──
  let ag="";
  const groups={}; // key -> list
  list.forEach(r=>{ const k=normThick(r.thickness); (groups[k]=groups[k]||[]).push(r); });
  const order=["12","15"]; Object.keys(groups).forEach(k=>{ if(!order.includes(k)) order.push(k); });
  const shownKeys=order.filter(k=>groups[k]&&groups[k].length);

  if(!shownKeys.length){
    ag+='<div class="sechead">📊 厚み別の修正率</div><div class="empty" style="padding:26px 0">この期間の集計はまだありません</div>';
  } else {
    ag+='<div class="sechead">📊 厚み別の修正率</div><div class="sumgrid">';
    shownKeys.forEach(k=>{
      const a=agg(groups[k]); const cc=thickColor(k);
      ag+=`<div class="sumcard" style="--cc:${cc}">
        <div class="th">${esc(thickLabel(k))}<span class="sub">${a.n}件</span></div>
        <div class="rate">${pct(a.rate)}<small>%</small></div>
        <div class="cnt">加工 ${a.total}枚 中 修正行き ${a.fix}枚</div>
      </div>`;
    });
    ag+='</div>';

    // 仕分け比較
    ag+='<div class="sechead">🔀 仕分けなし / あり 比較</div>';
    ag+='<div class="cmpwrap">';
    shownKeys.forEach(k=>{
      const none=groups[k].filter(r=>r.sorted!=="あり");
      const yes=groups[k].filter(r=>r.sorted==="あり");
      const an=agg(none), ay=agg(yes);
      const bothHave=an.n&&ay.n;
      const win=bothHave?(ay.rate<an.rate?"yes":(an.rate<ay.rate?"none":"")):"";
      ag+=`<div class="cmprow"><div class="cth">${esc(thickLabel(k))}</div><div class="cmpcols">
        ${cmpCol("仕分けなし",an,win==="none")}
        ${cmpCol("仕分けあり",ay,win==="yes")}
      </div>${bothHave?"":'<div class="cnt" style="font-size:10px;color:var(--sub);margin-top:6px">比較データなし（両方の記録がそろうと差が見えます）</div>'}</div>`;
    });
    ag+='</div>';
  }

  // 月別推移（直近6ヶ月・厚み全体・期間フィルタ非依存）
  ag+='<div class="sechead">📈 月別の修正率（直近6ヶ月・全厚み）</div>';
  ag+=trendHtml();

  // PC=2カラム（左=記録・右=集計）／スマホ=縦積み
  html+='<div class="cols"><div class="col">'+rec+'</div><div class="col">'+ag+'</div></div>';

  $("list").innerHTML=html; bindPchips();
}

function pchip(k,label){ return `<button class="pchip${PERIOD===k?" on":""}" data-p="${k}">${label}</button>`; }
function bindPchips(){ document.querySelectorAll(".pchip").forEach(b=>b.onclick=()=>{ PERIOD=b.dataset.p; render(); }); }

function cmpCol(lb,a,isWin){
  if(!a.n) return `<div class="cmpcol nd"><div class="lb">${lb}</div><div class="v">—</div><div class="c2">記録なし</div></div>`;
  return `<div class="cmpcol${isWin?" win":""}"><div class="lb">${lb}</div><div class="v">${pct(a.rate)}%</div><div class="c2">${a.fix}/${a.total}枚・${a.n}件</div></div>`;
}

/* ===== 刃物管理の加工実績リスト ===== */
function hamonoHtml(){
  if(HAMONO.state==="loading") return '<div class="hamowrap"><div class="hamoempty">加工実績を読み込み中…</div></div>';
  if(HAMONO.state==="err") return '<div class="hamowrap"><div class="hamoempty">刃物管理ツールから読み込めませんでした（この端末がGoogleログイン済みか確認）<br><button class="whoedit" style="font-size:12px;margin-top:4px" onclick="HAMONO.state=\'loading\';render();fetchHamono()">再読み込み</button></div></div>';
  if(!HAMONO.hist.length) return '<div class="hamowrap"><div class="hamoempty">最近の加工実績はまだありません（刃物管理ツールで「追加」すると出ます）</div></div>';
  const now=new Date();
  const recBySrc=t=>RECORDS.find(r=>r.srcT&&String(r.srcT).split(",").includes(String(t)));
  // 連続する同一商品×同一長さをグループ化（統合入力ボタン用）
  const groups=[];
  HAMONO.hist.forEach(h=>{
    const g=groups[groups.length-1];
    if(g&&g.name===h.name&&String(g.len)===String(h.len)) g.items.push(h);
    else groups.push({name:h.name,len:h.len,items:[h]});
  });
  let html='<div class="hamowrap">';
  groups.forEach(g=>{
    g.items.forEach(h=>{
      const d=new Date(Number(h.t));
      const hm=("0"+d.getHours()).slice(-2)+":"+("0"+d.getMinutes()).slice(-2);
      const sameDay=(d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth()&&d.getDate()===now.getDate());
      const when=sameDay?("今日 "+hm):((d.getMonth()+1)+"/"+d.getDate()+" "+hm);
      const lenm=h.len?(h.len/1000+"m"):"";
      const rec=recBySrc(h.t);
      const merged=rec&&String(rec.srcT).indexOf(",")>=0;
      html+=`<div class="hamorow" onclick="openFromHamono('${esc(String(h.t))}')">
        <div class="hi">
          <div class="hl1"><span class="hw">${esc(when)}</span><span class="hn">${esc(hamonoDisp(h.name))}</span>${lenm?`<span class="badge">${esc(lenm)}</span>`:""}</div>
          <div class="hl2">${Number(h.dan)||0}段 → <b>${Number(h.mai)||0}枚</b>${rec?`　<span class="hdone">✎ ${merged?"統合記録済・":""}${rec.fix}枚修正（${pct(rec.rate)}%）</span>`:""}</div>
        </div>
        <div class="hbtn2">${rec?"編集":"修正入力"}</div>
      </div>`;
    });
    if(g.items.length>=2&&!g.items.some(h=>recBySrc(h.t))){
      const dan=g.items.reduce((s,h)=>s+(Number(h.dan)||0),0);
      const mai=g.items.reduce((s,h)=>s+(Number(h.mai)||0),0);
      const lenm=g.len?(g.len/1000+"m"):"";
      const ids=g.items.map(h=>String(h.t)).join("_");
      html+=`<div class="hamomerge"><button type="button" onclick="openFromHamonoMerge('${esc(ids)}')">🔗 連続する${esc(hamonoDisp(g.name))}${lenm?"("+esc(lenm)+")":""} ${g.items.length}件を統合して入力（計${dan}段 → ${mai}枚）</button></div>`;
    }
  });
  html+='</div>';
  return html;
}
function hamonoPrefill_(items){
  // items=履歴（新しい順）。1件なら単発、複数なら統合入力
  openRecNew();
  editSrcT=items.map(h=>String(h.t)).join(",");
  const newest=items[0];
  const d=new Date(Number(newest.t));
  $("fDate").value=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  const m=HAMONO_MAP[newest.name]||{};
  if(m.th==="12"||m.th==="15"){ setThick(m.th); }
  else { setThick("other"); $("fThickOther").value=""; }
  $("fProduct").value=m.prod!==undefined?m.prod:hamonoDisp(newest.name);
  setLen(newest.len?(newest.len/1000+"m"):"");
  const mai=items.reduce((s,h)=>s+(Number(h.mai)||0),0);
  if(mai) $("fTotal").value=mai;
  if(items.length>1){
    const dan=items.reduce((s,h)=>s+(Number(h.dan)||0),0);
    $("fMemo").value="刃物管理"+items.length+"件を統合（計"+dan+"段）";
  }
  updateLive();
  setTimeout(()=>{ try{ $("fFix").focus(); $("fFix").select(); }catch(e){} },150);
}
function openFromHamono(t){
  const h=HAMONO.hist.find(x=>String(x.t)===String(t)); if(!h) return;
  const ex=RECORDS.find(r=>r.srcT&&String(r.srcT).split(",").includes(String(t)));
  if(ex){ openRec(ex.id); return; }
  hamonoPrefill_([h]);
}
function openFromHamonoMerge(tsStr){
  const ts=tsStr.split("_");
  const items=HAMONO.hist.filter(h=>ts.includes(String(h.t)));
  if(!items.length) return;
  const ex=RECORDS.find(r=>r.srcT&&String(r.srcT).split(",").some(t=>ts.includes(t)));
  if(ex){ openRec(ex.id); return; }
  hamonoPrefill_(items);
}

function trendHtml(){
  const t=TODAY||todayStr();
  const [ty,tm]=t.split("-").map(Number);
  const months=[];
  for(let i=5;i>=0;i--){ let y=ty, m=tm-i; while(m<=0){ m+=12; y--; } months.push(y+"-"+String(m).padStart(2,"0")); }
  const byMonth={}; RECORDS.forEach(r=>{ const k=ym(r.date); if(k) (byMonth[k]=byMonth[k]||[]).push(r); });
  const stats=months.map(k=>{ const a=agg(byMonth[k]||[]); return {k,rate:a.rate,n:a.n}; });
  const maxRate=Math.max(0.01,...stats.map(s=>s.rate));
  let bars='<div class="bars">';
  stats.forEach(s=>{
    const h=s.n?Math.max(4,Math.round(s.rate/maxRate*100)):3;
    bars+=`<div class="barcol${s.n?"":" empty"}">
      <div class="pct">${s.n?pct(s.rate)+"%":"—"}</div>
      <div class="bar" style="height:${h}%"></div>
      <div class="mo">${(+s.k.slice(5))}月</div>
      <div class="cn">${s.n?s.n+"件":""}</div>
    </div>`;
  });
  bars+='</div>';
  return '<div class="trend">'+bars+'</div>';
}

function recRow(r){
  const k=normThick(r.thickness), cc=thickColor(k);
  const sortOn=r.sorted==="あり";
  return `<div class="rec" style="--cc:${cc}" onclick="openRec('${esc(r.id)}')">
    <div class="info">
      <div class="l1"><span class="date">${esc(fmtMD(r.date))}</span>
        <span class="badge">${esc(thickBadge(r.thickness))}</span>
        ${r.length?`<span class="badge">${esc(r.length)}</span>`:""}
        ${r.grade?`<span class="badge">${esc(r.grade)}</span>`:""}
        <span class="badge sort${sortOn?" on":""}">仕分け${sortOn?"あり":"なし"}</span>
        ${r.product?`<span style="font-size:11px;color:var(--sub);font-weight:700">${esc(r.product)}</span>`:""}
      </div>
      <div class="l2">${r.total}枚中 <span class="rt">${r.fix}枚 修正行き（${pct(r.rate)}%）</span></div>
      <div class="l3">${r.srcT?`<span>🔪 刃物管理から</span>`:""}${r.by?`<span class="byb">${esc(r.by)}</span>`:""}${r.memo?`<span>📝 ${esc(r.memo)}</span>`:""}</div>
    </div>
    <div class="chev">›</div>
  </div>`;
}

/* ===== モーダル開閉 ===== */
document.querySelectorAll("[data-close]").forEach(b=>b.onclick=()=>$(b.dataset.close).classList.remove("show"));
document.querySelectorAll(".mwrap").forEach(w=>w.addEventListener("click",e=>{ if(e.target===w) w.classList.remove("show"); }));

/* ===== 不良記録 モーダル ===== */
function setThick(k){ selThick=k; document.querySelectorAll("#thickSeg .seg").forEach(b=>b.classList.toggle("on",b.dataset.th===k)); $("fThickOther").style.display=k==="other"?"":"none"; }
function setLen(v){ selLen=v||""; document.querySelectorAll("#lenSeg .seg").forEach(b=>b.classList.toggle("on",b.dataset.len===selLen)); }
function setSort(v){ selSort=v; document.querySelectorAll("#sortSeg .seg").forEach(b=>b.classList.toggle("on",b.dataset.sort===v)); $("fSortCond").style.display=v==="あり"?"":"none"; }
document.querySelectorAll("#thickSeg .seg").forEach(b=>b.onclick=()=>setThick(b.dataset.th));
document.querySelectorAll("#lenSeg .seg").forEach(b=>b.onclick=()=>setLen(selLen===b.dataset.len?"":b.dataset.len));
document.querySelectorAll("#sortSeg .seg").forEach(b=>b.onclick=()=>setSort(b.dataset.sort));
["fTotal","fFix"].forEach(id=>$(id).addEventListener("input",updateLive));
function updateLive(){
  const tot=parseInt($("fTotal").value,10)||0;
  const fix=parseInt($("fFix").value,10)||0;
  const box=$("liveBox");
  if(!tot){ box.innerHTML="加工枚数を入力してください"; return; }
  if(fix>tot){ box.innerHTML='<span style="color:var(--danger)">修正行き('+fix+'枚)が加工枚数('+tot+'枚)を超えています</span>'; return; }
  const rate=tot>0?fix/tot:0;
  box.innerHTML='修正行き <span class="rr">'+fix+'</span> 枚　修正率 <span class="rr">'+pct(rate)+'</span> %';
}
const GRADES=["丸節","小節","特上小","無節"];
let selGrade="丸節";
function setGrade(v){
  selGrade=v||"丸節";
  const seg=$("gradeSeg"); seg.innerHTML="";
  const opts=GRADES.includes(selGrade)?GRADES:GRADES.concat([selGrade]); // 旧データの独自等級も編集時は選択肢に出す
  opts.forEach(g=>{
    const b=document.createElement("button"); b.type="button";
    b.className="seg"+(g===selGrade?" on":""); b.textContent=g;
    b.onclick=()=>setGrade(g);
    seg.appendChild(b);
  });
}
function buildRecWhoChips(){
  const w=$("recWhoChips");
  if(!MEMBERS.length){ w.innerHTML='<span style="font-size:12px;color:var(--sub)">メンバー未登録です。右の「メンバーを編集」から登録してください。</span>'; return; }
  w.innerHTML="";
  MEMBERS.forEach(m=>{ const b=document.createElement("button"); b.type="button"; b.className="who"+(m===selWho?" on":""); b.textContent=m; b.onclick=()=>{ selWho=m; buildRecWhoChips(); }; w.appendChild(b); });
}
$("fab").onclick=()=>openRecNew();
function openRecNew(){
  editRecId=null; editSrcT=null;
  $("recTitle").textContent="修正行きを記録";
  $("fDate").value=TODAY||todayStr();
  setThick("12"); $("fThickOther").value="";
  setLen(""); setGrade("丸節");
  $("fProduct").value="";
  setSort("なし"); $("fSortCond").value="";
  $("fTotal").value=""; $("fFix").value="0";
  $("fMemo").value="";
  selWho=localStorage.getItem(WHO_KEY)||MEMBERS[0]||"";
  if(!MEMBERS.includes(selWho)) selWho=MEMBERS[0]||"";
  buildRecWhoChips(); updateLive();
  $("recErr").textContent=""; $("recDel").style.display="none";
  $("recWrap").classList.add("show");
}
function openRec(id){
  const r=RECORDS.find(x=>x.id===id); if(!r) return;
  editRecId=id; editSrcT=r.srcT||null;
  $("recTitle").textContent="記録を編集";
  $("fDate").value=r.date;
  const k=normThick(r.thickness);
  if(k==="12"||k==="15"){ setThick(k); $("fThickOther").value=""; }
  else { setThick("other"); $("fThickOther").value=r.thickness||""; }
  setLen(r.length||""); setGrade(r.grade||"丸節");
  $("fProduct").value=r.product||"";
  setSort(r.sorted==="あり"?"あり":"なし"); $("fSortCond").value=r.sortCond||"";
  $("fTotal").value=r.total; $("fFix").value=r.fix;
  $("fMemo").value=r.memo||"";
  selWho=r.by||localStorage.getItem(WHO_KEY)||MEMBERS[0]||"";
  buildRecWhoChips(); updateLive();
  $("recErr").textContent=""; $("recDel").style.display="";
  $("recWrap").classList.add("show");
}
function collectRec(){
  const date=$("fDate").value;
  if(!/^\d{4}-\d{2}-\d{2}$/.test(date)){ $("recErr").textContent="日付を入力してください"; return null; }
  let thickness=selThick;
  if(selThick==="other"){ thickness=$("fThickOther").value.trim(); if(!thickness){ $("recErr").textContent="厚みを入力してください"; return null; } }
  const total=parseInt($("fTotal").value,10)||0;
  if(!(total>0)){ $("recErr").textContent="加工枚数は1以上を入力してください"; return null; }
  const fix=parseInt($("fFix").value,10)||0;
  if(fix<0){ $("recErr").textContent="修正行きはマイナスにできません"; return null; }
  if(fix>total){ $("recErr").textContent="修正行きが加工枚数を超えています"; return null; }
  return { id:editRecId||"", date, thickness, length:selLen, grade:selGrade,
    product:$("fProduct").value.trim(), sorted:selSort,
    sortCond:selSort==="あり"?$("fSortCond").value.trim():"", total, fix,
    memo:$("fMemo").value.trim(), by:selWho, srcT:editSrcT||"" };
}
$("recSave").onclick=async()=>{
  const rec=collectRec(); if(!rec) return;
  if(rec.by) localStorage.setItem(WHO_KEY,rec.by);
  const btn=$("recSave"); btn.disabled=true; btn.textContent="保存中…"; $("recErr").textContent="";
  try{
    const j=await postAction({action:"saveRecord",record:rec});
    if(!j.ok) throw new Error(j.error||"保存できませんでした");
    $("recWrap").classList.remove("show");
    const rr=rec.total>0?rec.fix/rec.total:0;
    toast((editRecId?"更新しました":"記録しました")+"：加工"+rec.total+"枚中 "+rec.fix+"枚が修正行き（修正率 "+pct(rr)+"%）");
    await fetchAll();
  }catch(e){ $("recErr").textContent="保存エラー: "+e.message; }
  finally{ btn.disabled=false; btn.textContent="保存する"; }
};
$("recDel").onclick=async()=>{
  if(!editRecId) return;
  const r=RECORDS.find(x=>x.id===editRecId);
  if(!confirm((r?fmtMD(r.date)+"・"+thickBadge(r.thickness)+" ":"")+"の記録を削除しますか？")) return;
  try{
    const j=await postAction({action:"deleteRecord",id:editRecId});
    if(!j.ok) throw new Error(j.error||"削除できませんでした");
    $("recWrap").classList.remove("show");
    toast("削除しました");
    await fetchAll();
  }catch(e){ $("recErr").textContent="削除エラー: "+e.message; }
};

/* ===== メンバー編集 ===== */
$("memberEditBtn").onclick=()=>{ $("memberText").value=MEMBERS.join("\n"); $("memberErr").textContent=""; $("memberWrap").classList.add("show"); };
$("memberSave").onclick=async()=>{
  const names=$("memberText").value.split("\n").map(x=>x.trim()).filter(Boolean);
  if(!names.length){ $("memberErr").textContent="1人以上入力してください"; return; }
  const btn=$("memberSave"); btn.disabled=true; btn.textContent="保存中…";
  try{
    const j=await postAction({action:"saveMembers",names});
    if(!j.ok) throw new Error(j.error||"保存できませんでした");
    MEMBERS=names;
    $("memberWrap").classList.remove("show");
    if(!MEMBERS.includes(selWho)) selWho=MEMBERS[0]||"";
    buildRecWhoChips();
    toast("メンバーを更新しました");
    fetchAll();
  }catch(e){ $("memberErr").textContent="エラー: "+e.message; }
  finally{ btn.disabled=false; btn.textContent="保存する"; }
};

boot();
</script>
</body>
</html>
